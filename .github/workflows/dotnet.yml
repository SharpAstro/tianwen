name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # publish-apps + release are gated on workflow_dispatch only -- LFS bandwidth
  # makes it too expensive to publish all six AOT RIDs on every push to main.
  # Trigger via the /release-tianwen skill (gh workflow run dotnet.yml).
  workflow_dispatch:

env:
  VERSION_PREFIX: 4.2.${{ github.run_number }}
  VERSION_REV: ${{ github.run_attempt }}
  VERSION_HASH: +${{ github.sha }}
  BUILD_CONF: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: false
    # Narrow LFS pull: build needs catalog .lz (TianWen.Lib EmbeddedResource),
    # milkyway .lz (Gui Content) and fonts .ttf (Gui Content). Skipping test
    # fixtures (*.fits.gz) saves ~120 MB per pull -- they're only needed by
    # the test jobs, not for compilation or the .nupkg artifact.
    - name: Compute LFS cache key
      id: lfs-key
      run: |
        # Pointer file content (OID + size) changes only when the underlying
        # LFS object changes, so a pointer-hash key reliably identifies which
        # set of LFS objects we'd be pulling. Cache hit -> no LFS bandwidth.
        HASH=$(git ls-files '*.lz' '*.ttf' | xargs cat | sha256sum | cut -c1-16)
        echo "key=lfs-build-${HASH}" >> $GITHUB_OUTPUT
    - uses: actions/cache@v5
      with:
        path: .git/lfs
        key: ${{ steps.lfs-key.outputs.key }}
    - name: Fetch required LFS objects
      run: git lfs pull --include="*.lz,*.ttf"
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src
    - name: Build
      run: dotnet build -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
      working-directory: src
    - name: Upload NuGet package
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: '**/*.nupkg'
        retention-days: 5

  test-unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
    # cache-apt-pkgs-action installs the listed packages (apt-get install behind
    # the scenes) but caches /var/cache/apt by `version` key. First run pays
    # the full ~80 MB; subsequent runs restore in ~2s. fc-cache still runs to
    # rebuild the local fontconfig index.
    - uses: SharpAstro/cache-apt-pkgs-action@v1
      with:
        packages: ghostscript fonts-urw-base35 fontconfig
        version: 1.0
    - name: Rebuild fontconfig cache
      run: fc-cache -f
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: false
    # Narrow LFS pull: tests need catalogs (.lz), fonts (.ttf), and FITS test
    # fixtures (.fits.gz) embedded in TianWen.Lib.Tests.dll.
    - name: Compute LFS cache key
      id: lfs-key
      run: |
        HASH=$(git ls-files '*.lz' '*.ttf' '*.fits.gz' | xargs cat | sha256sum | cut -c1-16)
        echo "key=lfs-tests-${HASH}" >> $GITHUB_OUTPUT
    - uses: actions/cache@v5
      with:
        path: .git/lfs
        key: ${{ steps.lfs-key.outputs.key }}
    - name: Fetch required LFS objects
      run: git lfs pull --include="*.lz,*.ttf,*.fits.gz"
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src
    - name: Build
      run: dotnet build -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
      working-directory: src
    - name: Unit Tests
      run: dotnet test TianWen.Lib.Tests -c $BUILD_CONF --no-build
      working-directory: src

  test-functional:
    needs: build
    runs-on: ubuntu-latest
    steps:
    # astrometry-data-2mass-08-19 alone is ~1 GB. Caching saves ~30-60s and a
    # fair chunk of network on every run.
    - uses: SharpAstro/cache-apt-pkgs-action@v1
      with:
        packages: astrometry.net astrometry-data-2mass-08-19
        version: 1.0
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: false
    # Narrow LFS pull: same as test-unit -- catalogs, fonts, FITS fixtures.
    - name: Compute LFS cache key
      id: lfs-key
      run: |
        HASH=$(git ls-files '*.lz' '*.ttf' '*.fits.gz' | xargs cat | sha256sum | cut -c1-16)
        echo "key=lfs-tests-${HASH}" >> $GITHUB_OUTPUT
    - uses: actions/cache@v5
      with:
        path: .git/lfs
        key: ${{ steps.lfs-key.outputs.key }}
    - name: Fetch required LFS objects
      run: git lfs pull --include="*.lz,*.ttf,*.fits.gz"
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src
    - name: Build
      run: dotnet build -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
      working-directory: src
    - name: Functional Tests
      run: dotnet test TianWen.Lib.Tests.Functional -c $BUILD_CONF --no-build
      working-directory: src

  # publish-apps runs in parallel with the test jobs -- dotnet publish is long
  # on AOT targets (multiple minutes per RID), so gating on tests would block
  # the matrix unnecessarily. The `release` job below re-gates: binaries only
  # become a published GitHub Release when both tests AND this matrix succeed.
  #
  # Trigger: workflow_dispatch only (six AOT publishes pull LFS six times,
  # which used to blow through the 1 GB/month free tier on every push to main).
  # Use the /release-tianwen skill to invoke a release.
  publish-apps:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest,   rid: win-x64 }
          - { os: windows-latest,   rid: win-arm64 }
          - { os: ubuntu-latest,    rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
          - { os: macos-latest,     rid: osx-arm64 }
          - { os: macos-latest,     rid: osx-x64 }

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: false
    # Narrow LFS pull: AOT publish needs catalogs (TianWen.Lib EmbeddedResource),
    # fonts and milkyway texture (TianWen.UI.Gui Content). No FITS fixtures --
    # publish never builds the test projects.
    # Same key as the build job since they pull the same set of LFS objects --
    # the build cache populates and the publish matrix restores from it.
    - name: Compute LFS cache key
      id: lfs-key
      shell: bash
      run: |
        HASH=$(git ls-files '*.lz' '*.ttf' | xargs cat | sha256sum | cut -c1-16)
        echo "key=lfs-build-${HASH}" >> $GITHUB_OUTPUT
    - uses: actions/cache@v5
      with:
        path: .git/lfs
        key: ${{ steps.lfs-key.outputs.key }}
    - name: Fetch required LFS objects
      shell: bash
      run: git lfs pull --include="*.lz,*.ttf"
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Publish TianWen.Cli
      run: dotnet publish src/TianWen.Cli/TianWen.Cli.csproj -r ${{ matrix.rid }} -c Release -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:GeneratePackageOnBuild=false
      shell: bash
    - name: Publish TianWen.UI.FitsViewer
      run: dotnet publish src/TianWen.UI.FitsViewer/TianWen.UI.FitsViewer.csproj -r ${{ matrix.rid }} -c Release -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:GeneratePackageOnBuild=false
      shell: bash
    - name: Publish TianWen.UI.Gui
      run: dotnet publish src/TianWen.UI.Gui/TianWen.UI.Gui.csproj -r ${{ matrix.rid }} -c Release -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:GeneratePackageOnBuild=false
      shell: bash
    - name: Publish TianWen.Server
      run: dotnet publish src/TianWen.Server/TianWen.Server.csproj -r ${{ matrix.rid }} -c Release -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:GeneratePackageOnBuild=false
      shell: bash
    - uses: actions/upload-artifact@v7
      with:
        name: tianwen-cli-${{ matrix.rid }}
        path: src/TianWen.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/
    - uses: actions/upload-artifact@v7
      with:
        name: tianwen-fits-${{ matrix.rid }}
        path: src/TianWen.UI.FitsViewer/bin/Release/net10.0/${{ matrix.rid }}/publish/
    - uses: actions/upload-artifact@v7
      with:
        name: tianwen-gui-${{ matrix.rid }}
        path: src/TianWen.UI.Gui/bin/Release/net10.0/${{ matrix.rid }}/publish/
    - uses: actions/upload-artifact@v7
      with:
        name: tianwen-server-${{ matrix.rid }}
        path: src/TianWen.Server/bin/Release/net10.0/${{ matrix.rid }}/publish/

  # Gating: only ship binaries to a GitHub Release when tests pass AND all
  # target-platform publishes succeeded. Workflow_dispatch only -- piggybacks
  # off publish-apps, which is also dispatch-gated.
  release:
    needs: [test-unit, test-functional, publish-apps]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        path: artifacts
    - name: Create release archives
      run: |
        cd artifacts
        for dir in tianwen-cli-*/ tianwen-fits-*/ tianwen-gui-*/ tianwen-server-*/; do
          name="${dir%/}"
          tar -czf "../${name}.tar.gz" -C "$dir" .
        done
    - name: Create GitHub Release
      uses: SharpAstro/action-gh-release@v3
      with:
        tag_name: v${{ env.VERSION_PREFIX }}
        name: v${{ env.VERSION_PREFIX }}
        generate_release_notes: true
        files: |
          tianwen-cli-*.tar.gz
          tianwen-fits-*.tar.gz
          tianwen-gui-*.tar.gz
          tianwen-server-*.tar.gz

  # NuGet push still gates on tests -- once a version is pushed to nuget.org
  # we can't take it back, so being on the safer side is worth the serial wait.
  publish-nuget:
    needs: [test-unit, test-functional]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v8
      with:
        name: nuget-packages
    - name: Push NuGet package
      run: dotnet nuget push **/*.nupkg -s nuget.org -k ${{ secrets.NUGET_API_KEY }}
