name: Test Mesa Latest

# Diagnostic-only workflow for the lavapipe-x86_64-AVX2 black-output bug.
# Installs the latest Mesa via the kisak-mesa PPA on ubuntu-24.04 x86_64 and
# forces the GPU comp tests to run (bypassing the usual x86_64-lavapipe skip)
# via TIANWEN_GPU_TESTS_FORCE_RUN=1.
#
# Lives in its own file so triggering it (via `gh workflow run test-mesa-latest.yml`
# or the Actions UI) does NOT also trigger publish-apps / release in dotnet.yml.
on:
  workflow_dispatch:
  # Also fire on push when the workflow file itself changes -- workflow_dispatch
  # requires the workflow to be on the default branch, and stretch-improvements
  # hasn't been merged yet. Remove this trigger after merge.
  push:
    branches: [stretch-improvements]
    paths: ['.github/workflows/test-mesa-latest.yml']

env:
  VERSION_PREFIX: 4.2.${{ github.run_number }}
  VERSION_REV: ${{ github.run_attempt }}
  BUILD_CONF: Release

jobs:
  test-mesa-latest:
    runs-on: ubuntu-24.04
    steps:
    - name: Install latest Mesa from kisak-mesa PPA
      run: |
        sudo add-apt-repository -y ppa:kisak/kisak-mesa
        sudo apt-get update
        sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools vulkan-validationlayers ghostscript fonts-urw-base35 fontconfig lzip
        fc-cache -f
    - name: Vulkan ICD summary
      run: vulkaninfo --summary || true
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: false
    - name: Compute LFS cache key
      id: lfs-key
      run: |
        HASH=$(git ls-files '*.lz' '*.ttf' '*.bin.gz' '*.fits.gz' | xargs cat | sha256sum | cut -c1-16)
        echo "key=lfs-tests-${HASH}" >> $GITHUB_OUTPUT
    - uses: actions/cache@v5
      with:
        path: .git/lfs
        key: ${{ steps.lfs-key.outputs.key }}
    - name: Fetch required LFS objects
      run: git lfs pull --include="*.lz,*.ttf,*.bin.gz,*.fits.gz"
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src
    - name: Build
      run: dotnet build -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
      working-directory: src
    - name: GPU tests (force-run on lavapipe)
      env:
        TIANWEN_GPU_TESTS_FORCE_RUN: "1"
      run: |
        dotnet test TianWen.Lib.Tests -c $BUILD_CONF --no-build \
          --logger "console;verbosity=detailed" \
          --filter "FullyQualifiedName~GpuStretchPipelineTests|FullyQualifiedName~VkRendererPrimitiveTests|FullyQualifiedName~VkHistogramPipelineTests"
      working-directory: src
    - name: Upload GPU test output (always)
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: mesa-latest-gpu-test-output
        path: /tmp/TianWen.Lib.Tests/
        if-no-files-found: ignore
        retention-days: 7
