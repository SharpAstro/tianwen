name: Device Simulators (on-demand)

# On-demand integration tests that drive the real device drivers against a live simulator:
#   - alpaca-sim: the ASCOM Alpaca "OmniSim" (cross-platform HTTP) on Linux -- validates the
#     Alpaca transport end-to-end incl. the camera ImageBytes round-trip (unit-pinned but
#     previously unverified against a live server).
#   - ascom-sim: the native ASCOM Platform + COM simulators on Windows -- validates the COM
#     interop seam (Windows-only, so it cannot live in the Linux PR test matrix).
# Deliberately kept off the push/PR path (like publish-apps/release): provisioning a simulator per
# run -- an OmniSim download, or a full ASCOM Platform install -- is too heavy for every push.
# Two entry points:
#   - workflow_dispatch: run either or both suites on demand.
#       gh workflow run simulators.yml [-f suite=alpaca|ascom|both]
#   - schedule (weekly): runs the ALPACA leg only, so the Alpaca drivers stay honest without anyone
#     remembering to dispatch (it caught two real driver bugs on its first run). The Windows ASCOM
#     leg stays dispatch-only -- a full Platform install every week is not worth the cost for a seam
#     the Alpaca run already covers semantically.
on:
  workflow_dispatch:
    inputs:
      suite:
        description: Which simulator suite(s) to run
        type: choice
        options: [both, alpaca, ascom]
        default: both
  schedule:
    # Mondays 06:00 UTC. Alpaca-only regression guard (see the ascom-sim `if`).
    - cron: '0 6 * * 1'

env:
  BUILD_CONF: Release
  TEST_PROJECT: TianWen.Lib.Tests.Simulators
  OMNISIM_TAG: v0.4.0
  ASCOM_PLATFORM_TAG: v7.1.3
  ASCOM_PLATFORM_INSTALLER: ASCOMPlatform713.4851.exe

jobs:
  # Produce the *.gs.gz preprocessed catalogs once (the only step needing lzip + the *.lz LFS
  # objects) and share them with the sim jobs, mirroring how dotnet.yml's build job feeds its
  # test jobs. This is what lets the Windows leg build TianWen.Lib without lzip.
  catalogs:
    runs-on: ubuntu-latest
    steps:
    - name: Install lzip
      run: sudo apt-get update && sudo apt-get install -y lzip
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: false
    - name: Fetch catalog LFS objects
      run: git lfs pull --include="*.lz,*.bin.gz"
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    # Building TianWen.Lib runs the PreprocessCatalogs MSBuild target as a side effect.
    - name: Build TianWen.Lib (runs PreprocessCatalogs)
      run: dotnet build TianWen.Lib/TianWen.Lib.csproj -c $BUILD_CONF
      working-directory: src
    - name: Upload preprocessed catalogs
      uses: actions/upload-artifact@v7
      with:
        name: preprocessed-catalogs
        path: src/TianWen.Lib/Astrometry/Catalogs/*.gs.gz
        retention-days: 1

  alpaca-sim:
    needs: catalogs
    # Runs on the weekly schedule (inputs.suite is empty there) and on a dispatch selecting alpaca/both.
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'both' || github.event.inputs.suite == 'alpaca' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: false
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    # Skip PreprocessCatalogs by dropping in the prebuilt *.gs.gz and making them newer than the
    # *.lz sources (MSBuild Inputs/Outputs check). No LFS pull: the Alpaca sim tests load nothing
    # from LFS, and the embedded *.bin.gz (LFS pointer text here) is never read at runtime.
    - name: Download preprocessed catalogs
      uses: actions/download-artifact@v8
      with:
        name: preprocessed-catalogs
        path: src/TianWen.Lib/Astrometry/Catalogs/
    - name: Refresh preprocessed catalog mtimes
      run: touch src/TianWen.Lib/Astrometry/Catalogs/*.gs.gz
    # Download the self-contained OmniSim, launch it headless, discover the port it bound (from
    # its startup log, falling back to the Alpaca default 11111) and export the base URL so the
    # test suite's TIANWEN_ALPACA_SIM gate opens.
    - name: Launch ASCOM Alpaca Simulator (OmniSim)
      run: |
        set -euo pipefail
        url="https://github.com/ASCOMInitiative/ASCOM.Alpaca.Simulators/releases/download/${OMNISIM_TAG}/ascom.alpaca.simulators.linux-x64.tar.xz"
        echo "Downloading $url"
        curl -fsSL -o omnisim.tar.xz "$url"
        mkdir -p omnisim && tar -xJf omnisim.tar.xz -C omnisim
        exe=$(find omnisim -maxdepth 3 -type f -name 'ascom.alpaca.simulators' | head -1)
        [ -n "$exe" ] || { echo "OmniSim executable not found in archive:"; find omnisim -maxdepth 3 -type f | head -50; exit 1; }
        chmod +x "$exe"
        echo "Launching $exe"
        nohup "$exe" > "$GITHUB_WORKSPACE/omnisim.log" 2>&1 &
        base=""
        for i in $(seq 1 60); do
          port=$(grep -oE 'https?://(127\.0\.0\.1|localhost|0\.0\.0\.0|\[::\]):[0-9]+' "$GITHUB_WORKSPACE/omnisim.log" 2>/dev/null | grep -oE '[0-9]+$' | head -1 || true)
          for cand in "$port" 11111; do
            [ -n "$cand" ] || continue
            if curl -fsS "http://localhost:${cand}/management/apiversions" >/dev/null 2>&1; then base="http://localhost:${cand}"; break; fi
          done
          [ -n "$base" ] && break
          sleep 1
        done
        [ -n "$base" ] || { echo "OmniSim did not become ready. Log:"; cat "$GITHUB_WORKSPACE/omnisim.log"; exit 1; }
        echo "OmniSim ready at $base"
        curl -fsS "$base/management/v1/configureddevices" && echo
        echo "TIANWEN_ALPACA_SIM=$base" >> "$GITHUB_ENV"
    - name: Restore
      run: dotnet restore $TEST_PROJECT
      working-directory: src
    - name: Build
      run: dotnet build $TEST_PROJECT -c $BUILD_CONF --no-restore
      working-directory: src
    - name: Alpaca simulator tests
      run: dotnet test $TEST_PROJECT -c $BUILD_CONF --no-build --logger "console;verbosity=detailed"
      working-directory: src
    - name: Upload OmniSim log
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: omnisim-log
        path: omnisim.log
        if-no-files-found: ignore
        retention-days: 7

  ascom-sim:
    needs: catalogs
    if: ${{ github.event.inputs.suite == 'both' || github.event.inputs.suite == 'ascom' }}
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: false
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Download preprocessed catalogs
      uses: actions/download-artifact@v8
      with:
        name: preprocessed-catalogs
        path: src/TianWen.Lib/Astrometry/Catalogs/
    - name: Refresh preprocessed catalog mtimes
      shell: pwsh
      run: Get-ChildItem src/TianWen.Lib/Astrometry/Catalogs/ -Filter *.gs.gz | ForEach-Object { $_.LastWriteTime = Get-Date }
    # The ASCOM Platform installer REQUIRES .NET Framework 3.5, but windows-latest enables only 4.x.
    # Under /VERYSILENT the installer's "activate .NET 3.5" prompt is suppressed with nothing to answer
    # it, so it hangs forever (it ate a whole runner before we caught it). Enable the feature up front;
    # this is idempotent and the payload is present on the runner image.
    - name: Enable .NET Framework 3.5 (ASCOM Platform prerequisite)
      shell: pwsh
      run: |
        Write-Host "Enabling NetFx3..."
        Enable-WindowsOptionalFeature -Online -FeatureName NetFx3 -All -NoRestart | Out-Null
        "NetFx3 state: " + (Get-WindowsOptionalFeature -Online -FeatureName NetFx3).State
    # Install the ASCOM Platform UNATTENDED. Platform 7 is an INSTALLAWARE package, whose silent switch
    # is /s -- NOT Inno's /SILENT|/VERYSILENT. Passing Inno switches made the InstallAware bootstrapper
    # ignore them and bring up its UI to wait for input, hanging forever (diagnosed via the process-tree
    # dump: the inner ASCOMPlatform*.exe sat idle in C:\ProgramData\mia*.tmp with no Inno /LOG created).
    # We still launch non-blocking + wait 6 min + dump the live process tree on no-exit, as a safety net
    # (InstallAware writes no Inno log, so the process tree is the useful signal). timeout-minutes backstops.
    - name: Install ASCOM Platform
      timeout-minutes: 12
      shell: pwsh
      run: |
        $url = "https://github.com/ASCOMInitiative/ASCOMPlatform/releases/download/$env:ASCOM_PLATFORM_TAG/$env:ASCOM_PLATFORM_INSTALLER"
        Write-Host "Downloading $url"
        Invoke-WebRequest -Uri $url -OutFile ascom-platform.exe
        Write-Host "Launching installer (InstallAware unattended: /s)"
        $p = Start-Process -FilePath .\ascom-platform.exe -ArgumentList '/s' -PassThru
        $deadlineSec = 360
        if ($p.WaitForExit($deadlineSec * 1000)) {
          Write-Host "Installer exited with code $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { exit $p.ExitCode }
        } else {
          Write-Host "::error::Installer did not exit within $deadlineSec s -- dumping diagnostics"
          Write-Host "===== Running install-related processes ====="
          Get-Process | Where-Object { $_.ProcessName -match 'ascom|setup|install|msiexec|dotnet|vc_?redist|dism|rundll32|drvinst' } |
            Format-Table Id,ProcessName,StartTime,Path -AutoSize | Out-String -Width 400 | Write-Host
          Write-Host "===== Pending reboot flag ====="
          Write-Host ("CBS RebootPending: " + (Test-Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending'))
          try { $p.Kill($true) } catch { Write-Host "kill: $_" }
          exit 1
        }
    # Diagnostic: dump the ASCOM registry tree in BOTH views so we can see where Platform 7 registers
    # the Platform version + the "<Type> Drivers" driver lists (32-bit Wow6432Node vs native 64-bit) --
    # this is what AscomDeviceIterator reads, and confirms the both-views fix hits the right keys.
    - name: Dump ASCOM registry tree (diagnostic)
      if: always()
      continue-on-error: true
      shell: pwsh
      run: |
        "ProcessArchitecture: $([System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture); Is64BitProcess: $([Environment]::Is64BitProcess)" | Write-Host
        foreach ($root in 'HKLM:\SOFTWARE\ASCOM','HKLM:\SOFTWARE\WOW6432Node\ASCOM') {
          Write-Host "===== $root ====="
          if (Test-Path $root) {
            Get-ChildItem $root -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name | Write-Host
          } else { Write-Host "(absent)" }
        }
        Write-Host "===== Platform version values (both views) ====="
        foreach ($p in 'HKLM:\SOFTWARE\ASCOM\Platform','HKLM:\SOFTWARE\WOW6432Node\ASCOM\Platform') {
          if (Test-Path $p) { Write-Host "$p ->"; (Get-ItemProperty $p | Format-List | Out-String) | Write-Host } else { Write-Host "$p (absent)" }
        }
    - name: Restore
      run: dotnet restore $env:TEST_PROJECT
      working-directory: src
    - name: Build
      run: dotnet build $env:TEST_PROJECT -c $env:BUILD_CONF --no-restore
      working-directory: src
    - name: ASCOM simulator tests
      env:
        TIANWEN_ASCOM_CI: "1"
      run: dotnet test $env:TEST_PROJECT -c $env:BUILD_CONF --no-build --logger "console;verbosity=detailed"
      working-directory: src
