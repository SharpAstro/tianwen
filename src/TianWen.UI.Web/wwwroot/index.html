<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Text-only: the favicon below is already the telescope emoji, so an emoji here would
         show twice next to the tab label. Boot-time fallback; each view sets "Astro - <view>". -->
    <title>Astro - Planner</title>
    <base href="/" />
    <!-- Publish-time fingerprinting (OverrideHtmlAssetPlaceholders): the preload id, the importmap
         element, and the #[.{fingerprint}] marker below are rewritten to the hashed asset names.
         Without them the published page 404s on _framework/blazor.webassembly.js (only the
         fingerprinted file exists). Mirrors Chess.Web. -->
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- Zero-asset favicon: the 🔭 the app is named for, as an inline SVG data URI. -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔭</text></svg>" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="boot">
            <div class="boot-spinner"></div>
            <div class="boot-text">Loading TianWen...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>

    <!-- The WebGl.Renderer JS module (_content/WebGl.Renderer/webgl-renderer.js) is imported by the
         library itself via JSHost.ImportAsync - no script tag needed here. -->

    <!-- Best-effort browser geolocation for the observing site.
         tianwenGeoState: the Permissions-API state ('granted' | 'prompt' | 'denied' | 'unknown') so
         the app can decide whether a position fetch is instant or will open a permission prompt.
         tianwenGeo(waitForPrompt): resolves [lat, lon] or null. With waitForPrompt=true there is NO
         timeout - the promise waits for the user's prompt decision (a fixed timeout here is exactly
         what made "Allow" appear dead: it expired while the prompt was still open, so the grant
         landed after the app had given up until the next refresh). -->
    <script>
        window.tianwenGeoState = function () {
            if (!navigator.permissions || !navigator.geolocation) return Promise.resolve("unknown");
            return navigator.permissions.query({ name: "geolocation" })
                .then(function (s) { return s.state; })
                .catch(function () { return "unknown"; });
        };
        // Canvas metrics / resize watching / focus / drag pointer-capture all moved into
        // WebGl.Renderer 1.2's <WebGlCanvas> component - only the geolocation helpers remain.
        window.tianwenGeo = function (waitForPrompt) {
            return new Promise(function (resolve) {
                if (!navigator.geolocation) { resolve(null); return; }
                var opts = waitForPrompt
                    ? { maximumAge: 600000 }
                    : { timeout: 10000, maximumAge: 600000 };
                navigator.geolocation.getCurrentPosition(
                    function (p) { resolve([p.coords.latitude, p.coords.longitude]); },
                    function () { resolve(null); },
                    opts);
            });
        };

        // F3 opens the in-app catalog search (the sky atlas). The <canvas> keydown handler runs
        // our search, but the browser ALSO fires its native find-in-page for F3 -- so both open at
        // once. Cancel the browser default here (capture phase, so it wins before anything else);
        // the canvas keydown listener still fires, so our search opens and the browser bar does
        // not. The whole page is one canvas app, so there is nothing for browser find to match
        // anyway. Blazor's plain @onkeydown can't preventDefault after the fact, hence this listener.
        window.addEventListener("keydown", function (e) {
            if (e.key === "F3") {
                e.preventDefault();
            }
        }, { capture: true });

        // A trackpad pinch-zoom (and ctrl+scroll) reaches the page as ctrl+wheel; the browser's native
        // default zooms the WHOLE PAGE (chrome and all). This showcase owns zoom itself -- the canvas
        // pinch-zoom + the sky-map wheel-zoom -- so cancel the browser default page-wide. window-level +
        // non-passive + capture so it wins over EVERY region (toolbar / title / the selectable-text DOM
        // overlay), not just the canvas -- a canvas-only guard leaves a pinch over the chrome still zooming.
        // preventDefault does not stop propagation, so the canvas's @onwheel still routes the delta to the
        // app (SkyMap zooms toward the cursor). Keyboard ctrl +/-/0 is deliberately left alone (accessibility
        // zoom). Same reason as the F3 guard above: a passive Blazor @onwheel can't preventDefault this.
        window.addEventListener("wheel", function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false, capture: true });
</script>

    <!-- IndexedDB cache for the decoded Tycho-2 star buffer (window.tyc2Cache). Loaded before
         Blazor so it's defined by the time the atlas first opens. -->
    <script src="tyc2-cache.js"></script>

    <!-- E2E-only view-state hook. When the app is opened with ?e2e=1, Blazor calls __tianwenTestInit
         with a .NET ref (see Planner.razor), so browser tests can read LIVE sky-map view state -
         window.__tianwenTest.getSkyView() -> {fovDeg, centerRA, centerDec} - via page.evaluate. This
         is how a single-WebGL-canvas app asserts "the gesture zoomed/panned" with no DOM to inspect
         and no pixel reads. Defined always (a harmless no-op until called); never invoked in a normal
         session because Planner only calls __tianwenTestInit behind the ?e2e=1 gate. -->
    <script>
        window.__tianwenTestInit = function (ref) {
            window.__tianwenTest = {
                getSkyView: function () { return ref.invokeMethodAsync('GetSkyViewJson'); },
                // Canvas-drawn planner search box + autocomplete row rects (CSS px), so an E2E can click
                // the canvas at the exact target (there is no DOM for these). Return "null" when absent.
                getPlannerSearchRect: function () { return ref.invokeMethodAsync('GetPlannerSearchRectJson'); },
                getPlannerSuggestionRect: function (i) { return ref.invokeMethodAsync('GetPlannerSuggestionRectJson', i); },
            };
        };
    </script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
